<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My blog | Personal Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark: #0f172a;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--dark); overflow-x: hidden; }

        /* Background Animation Elements */
        .blob {
            position: fixed; width: 400px; height: 400px;
            background: linear-gradient(135deg, #6366f133 0%, #a855f733 100%);
            filter: blur(80px); border-radius: 50%; z-index: -1; animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(50%, 20%); }
        }

        /* Header & Logo */
        header { 
            padding: 4rem 1rem; text-align: center; 
            background: white; border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        header h1 { 
            font-size: 3rem; font-weight: 700; 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* Blog Grid */
        .container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        #blog-posts { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
        }

        /* Animated Post Card */
        .post-card { 
            background: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5); border-radius: 20px; 
            overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateY(30px); /* For JS animation */
        }
        
        .post-card.show { opacity: 1; transform: translateY(0); }
        .post-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .post-image { width: 100%; height: 200px; background: #ddd; position: relative; }
        .post-image::after { content: '📝'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; opacity: 0.3; }

        .post-content { padding: 25px; }
        .category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); font-weight: 700; margin-bottom: 8px; display: block; }
        .post-card h3 { font-size: 1.4rem; margin-bottom: 12px; line-height: 1.3; }
        .post-card p { color: #64748b; font-size: 0.95rem; line-height: 1.6; }

        /* Admin Trigger */
        #admin-trigger {
            position: fixed; right: 30px; bottom: 30px;
            background: var(--dark); color: white; width: 55px; height: 55px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 1000;
            transition: 0.3s;
        }
        #admin-trigger:hover { transform: rotate(90deg); background: var(--primary); }

        /* Modal / Dashboard */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px);
            z-index: 2000; align-items: center; justify-content: center; 
        }
        .modal-content { background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        input, textarea { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; margin-top: 10px; font-size: 1rem; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; font-size: 1rem; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: var(--secondary); transform: scale(1.02); }

        #dashboard-ui { display: none; }
    </style>
</head>
<body>

    <div class="blob"></div>

    <header>
        <h1>My blog</h1>
        <p>A refined space for ideas and innovation</p>
    </header>

    <div class="container">
        <div id="blog-posts">
            </div>
    </div>

    <div id="admin-trigger" onclick="openLogin()">⚙️</div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <div id="login-ui">
                <h2 style="margin-bottom: 10px;">Security Check</h2>
                <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;">Enter the 4-digit passcode to manage posts.</p>
                <input type="password" id="passcode" placeholder="Passcode (0506)" maxlength="4" style="text-align: center; font-size: 1.5rem; letter-spacing: 10px;">
                <button class="btn" onclick="checkPasscode()">Unlock Dashboard</button>
                <button class="btn" style="background: transparent; color: #64748b; margin-top: 5px;" onclick="closeModal()">Close</button>
            </div>

            <div id="dashboard-ui">
                <h2 style="margin-bottom: 15px;">New Post</h2>
                <input type="text" id="post-title" placeholder="Catchy Title">
                <input type="text" id="post-category" placeholder="Category (e.g. Design, Code)">
                <textarea id="post-body" rows="5" placeholder="Share your story..."></textarea>
                <button class="btn" onclick="savePost()">Publish to Live Site</button>
                <button class="btn" style="background: #ef4444; margin-top: 10px;" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const PASSCODE = "0506";
        let posts = JSON.parse(localStorage.getItem('animated_blog_posts')) || [
            { title: "The Future of Web Design", category: "Technology", body: "Clean layouts and micro-animations are taking over the web in 2026." },
            { title: "Staying Consistent", category: "Mindset", body: "The secret to building a successful blog is writing every single week." }
        ];

        function renderPosts() {
            const container = document.getElementById('blog-posts');
            container.innerHTML = posts.map((post, index) => `
                <div class="post-card" style="transition-delay: ${index * 0.1}s">
                    <div class="post-image"></div>
                    <div class="post-content">
                        <span class="category">${post.category}</span>
                        <h3>${post.title}</h3>
                        <p>${post.body.substring(0, 120)}...</p>
                    </div>
                </div>
            `).join('');

            // Trigger Entry Animation
            setTimeout(() => {
                const cards = document.querySelectorAll('.post-card');
                cards.forEach(card => card.classList.add('show'));
            }, 100);
        }

        function openLogin() { document.getElementById('admin-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('admin-modal').style.display = 'none'; }

        function checkPasscode() {
            if (document.getElementById('passcode').value === PASSCODE) {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('dashboard-ui').style.display = 'block';
            } else {
                alert("Access Denied");
            }
        }

        function savePost() {
            const title = document.getElementById('post-title').value;
            const category = document.getElementById('post-category').value;
            const body = document.getElementById('post-body').value;

            if (title && category && body) {
                posts.unshift({ title, category, body });
                localStorage.setItem('animated_blog_posts', JSON.stringify(posts));
                renderPosts();
                closeModal();
                document.getElementById('post-title').value = '';
                document.getElementById('post-body').value = '';
            }
        }

        function logout() {
            document.getElementById('login-ui').style.display = 'block';
            document.getElementById('dashboard-ui').style.display = 'none';
            document.getElementById('passcode').value = '';
            closeModal();
        }

        renderPosts();
    </script>
</body>
</html>
