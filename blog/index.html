<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My blog | Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --dark: #0f172a; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--dark); }

        header { padding: 4rem 1rem; text-align: center; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        header h1 { font-size: 3rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        #blog-posts { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        .post-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s; padding: 25px; position: relative; }
        .category { font-size: 0.7rem; text-transform: uppercase; color: var(--primary); font-weight: 700; }
        .post-card h3 { margin: 10px 0; }
        .post-card p { color: #64748b; font-size: 0.95rem; }

        /* Admin Action Buttons */
        .admin-actions { margin-top: 15px; display: none; gap: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .btn-sm { padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.2s; }
        .edit-btn { background: #e0e7ff; color: var(--primary); }
        .del-btn { background: #fee2e2; color: #ef4444; }

        /* Admin Floating UI */
        #admin-trigger { position: fixed; right: 30px; bottom: 30px; background: var(--dark); color: white; width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 500px; }
        
        input, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; margin-top: 10px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 20px; }
        
        #empty-state { text-align: center; grid-column: 1 / -1; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body>

    <header>
        <h1>My blog</h1>
        <p>Your thoughts, perfectly organized.</p>
    </header>

    <div class="container">
        <div id="blog-posts">
            </div>
    </div>

    <div id="admin-trigger" onclick="openLogin()">⚙️</div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <div id="login-ui">
                <h2>Admin Login</h2>
                <input type="password" id="passcode" placeholder="Enter Passcode (0506)">
                <button class="btn-main" onclick="checkPasscode()">Unlock</button>
                <button class="btn-main" style="background:none; color: #64748b;" onclick="closeModal()">Cancel</button>
            </div>

            <div id="dashboard-ui" style="display:none;">
                <h2 id="form-title">New Post</h2>
                <input type="hidden" id="edit-index" value="-1">
                <input type="text" id="post-title" placeholder="Title">
                <input type="text" id="post-category" placeholder="Category">
                <textarea id="post-body" rows="5" placeholder="Content"></textarea>
                <button class="btn-main" id="save-btn" onclick="savePost()">Publish Post</button>
                <button class="btn-main" style="background: #ef4444;" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const PASSCODE = "0506";
        let isAdmin = false;
        // Start with empty array (no presets)
        let posts = JSON.parse(localStorage.getItem('crud_blog_posts')) || [];

        function renderPosts() {
            const container = document.getElementById('blog-posts');
            if (posts.length === 0) {
                container.innerHTML = `<div id="empty-state"><h3>No posts yet. Click the gear icon to add one!</h3></div>`;
                return;
            }

            container.innerHTML = posts.map((post, index) => `
                <div class="post-card">
                    <span class="category">${post.category}</span>
                    <h3>${post.title}</h3>
                    <p>${post.body}</p>
                    <div class="admin-actions" style="display: ${isAdmin ? 'flex' : 'none'}">
                        <button class="btn-sm edit-btn" onclick="editPost(${index})">Edit</button>
                        <button class="btn-sm del-btn" onclick="deletePost(${index})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function openLogin() { document.getElementById('admin-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('admin-modal').style.display = 'none'; resetForm(); }

        function checkPasscode() {
            if (document.getElementById('passcode').value === PASSCODE) {
                isAdmin = true;
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('dashboard-ui').style.display = 'block';
                renderPosts();
            } else { alert("Wrong passcode!"); }
        }

        function savePost() {
            const title = document.getElementById('post-title').value;
            const category = document.getElementById('post-category').value;
            const body = document.getElementById('post-body').value;
            const editIndex = parseInt(document.getElementById('edit-index').value);

            if (title && category && body) {
                const postData = { title, category, body };
                if (editIndex > -1) {
                    posts[editIndex] = postData;
                } else {
                    posts.unshift(postData);
                }
                localStorage.setItem('crud_blog_posts', JSON.stringify(posts));
                renderPosts();
                closeModal();
            }
        }

        function editPost(index) {
            openLogin();
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('dashboard-ui').style.display = 'block';
            
            document.getElementById('form-title').innerText = "Edit Post";
            document.getElementById('save-btn').innerText = "Update Post";
            document.getElementById('edit-index').value = index;
            
            document.getElementById('post-title').value = posts[index].title;
            document.getElementById('post-category').value = posts[index].category;
            document.getElementById('post-body').value = posts[index].body;
        }

        function deletePost(index) {
            if (confirm("Delete this post permanently?")) {
                posts.splice(index, 1);
                localStorage.setItem('crud_blog_posts', JSON.stringify(posts));
                renderPosts();
            }
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "New Post";
            document.getElementById('save-btn').innerText = "Publish Post";
            document.getElementById('edit-index').value = "-1";
            document.getElementById('post-title').value = '';
            document.getElementById('post-category').value = '';
            document.getElementById('post-body').value = '';
        }

        function logout() {
            isAdmin = false;
            document.getElementById('login-ui').style.display = 'block';
            document.getElementById('dashboard-ui').style.display = 'none';
            document.getElementById('passcode').value = '';
            renderPosts();
            closeModal();
        }

        renderPosts();
    </script>
</body>
</html>
