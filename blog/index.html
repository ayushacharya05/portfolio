<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Blog | Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
            --accent: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--light); color: var(--dark); line-height: 1.6; }

        /* Header */
        header { background: white; padding: 2rem 1rem; text-align: center; border-bottom: 1px solid #e2e8f0; }
        header h1 { font-size: 2.5rem; color: var(--dark); }

        /* Blog Grid */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        #blog-posts { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .post-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; }
        .post-card:hover { transform: translateY(-5px); }
        .post-content { padding: 20px; }
        .category { display: inline-block; background: #dbeafe; color: var(--primary); font-size: 0.75rem; font-weight: bold; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; }
        .post-card h3 { margin-bottom: 10px; font-size: 1.25rem; }
        .post-card p { color: #64748b; font-size: 0.95rem; }

        /* Admin Floating Icon */
        #admin-trigger {
            position: fixed; right: 30px; bottom: 30px;
            background: var(--dark); color: white; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 10px 15px rgba(0,0,0,0.2); z-index: 1000;
        }

        /* Modal / Dashboard */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; 
        }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; }
        
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* Dashboard view */
        #dashboard-ui { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Insightful Notes</h1>
        <p>A place for thoughts, code, and creativity</p>
    </header>

    <div class="container">
        <div id="blog-posts">
            </div>
    </div>

    <div id="admin-trigger" onclick="openLogin()">⚙️</div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <div id="login-ui">
                <h2 style="margin-bottom: 15px;">Admin Access</h2>
                <input type="password" id="passcode" placeholder="Enter Passcode (0506)">
                <button class="btn" style="margin-top: 15px;" onclick="checkPasscode()">Login</button>
                <button class="btn" style="background: #94a3b8; margin-top: 10px;" onclick="closeModal()">Cancel</button>
            </div>

            <div id="dashboard-ui">
                <h2 style="margin-bottom: 15px;">Add New Post</h2>
                <div class="form-group">
                    <input type="text" id="post-title" placeholder="Post Title">
                </div>
                <div class="form-group">
                    <input type="text" id="post-category" placeholder="Category (e.g. Tech, Travel)">
                </div>
                <div class="form-group">
                    <textarea id="post-body" rows="5" placeholder="Write your content here..."></textarea>
                </div>
                <button class="btn" onclick="savePost()">Publish Post</button>
                <button class="btn" style="background: #ef4444; margin-top: 10px;" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const PASSCODE = "0506";
        let posts = JSON.parse(localStorage.getItem('my_blog_posts')) || [
            { title: "Welcome to my Blog", category: "News", body: "This is your first post! Use the admin icon to add more." }
        ];

        // Initial Render
        function renderPosts() {
            const container = document.getElementById('blog-posts');
            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-content">
                        <span class="category">${post.category}</span>
                        <h3>${post.title}</h3>
                        <p>${post.body.substring(0, 100)}...</p>
                    </div>
                </div>
            `).join('');
        }

        // Modal Logic
        function openLogin() {
            document.getElementById('admin-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('admin-modal').style.display = 'none';
        }

        function checkPasscode() {
            const input = document.getElementById('passcode').value;
            if (input === PASSCODE) {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('dashboard-ui').style.display = 'block';
            } else {
                alert("Incorrect Passcode!");
            }
        }

        // Save Post
        function savePost() {
            const title = document.getElementById('post-title').value;
            const category = document.getElementById('post-category').value;
            const body = document.getElementById('post-body').value;

            if (title && category && body) {
                const newPost = { title, category, body };
                posts.unshift(newPost); // Add to start of array
                localStorage.setItem('my_blog_posts', JSON.stringify(posts));
                
                renderPosts();
                closeModal();
                
                // Clear inputs
                document.getElementById('post-title').value = '';
                document.getElementById('post-category').value = '';
                document.getElementById('post-body').value = '';
            } else {
                alert("Please fill in all fields");
            }
        }

        function logout() {
            document.getElementById('passcode').value = '';
            document.getElementById('login-ui').style.display = 'block';
            document.getElementById('dashboard-ui').style.display = 'none';
            closeModal();
        }

        // Run on load
        renderPosts();
    </script>
</body>
</html>
