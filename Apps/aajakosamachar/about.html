<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>About - आजको समाचार</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@500;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root { --primary-color: #0052D4; --surface-light: #F2F4F7; --card-bg-light: #FFFFFF; --text-main-light: #1A1C1E; --surface-dark: #0E1113; }
    body { background: var(--surface-light); font-family: 'Outfit', sans-serif; color: var(--text-main-light); padding-bottom: 90px; }
    .app-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1050; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(0,0,0,0.05); }
    .brand-name { font-family: 'Mukta', sans-serif; font-weight: 800; font-size: 1.8rem; margin: 0; color: #000; }
    .content-card { margin: 20px 16px; padding: 30px 20px; background: var(--card-bg-light); border-radius: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); text-align: center; }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 10px 0 25px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.08); text-align: center; }
    .nav-item { color: #70757A; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
    .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 2px; }
    body.dark-mode { background: #0E1113; color: #E2E2E6; }
    .dark-mode .app-header { background: #111; border-bottom: 2px solid #333; }
    .dark-mode .brand-name { color: white; }
    .dark-mode .content-card { background: #1C1F26; }
    .dark-mode .bottom-nav { background: #111; }
  </style>
</head>
<body class="dark-mode-check">

  <header class="app-header">
    <a href="index.html" style="color: inherit;"><i class="fas fa-arrow-left fa-lg"></i></a>
    <h1 class="brand-name">आजको समाचार</h1>
    <div></div>
  </header>

  <div class="content-card">
    <i class="fas fa-info-circle fa-3x mb-3" style="color:var(--primary-color)"></i>
    <h2 class="fw-bold mb-4">हाम्रो बारेमा</h2>
    <p>आजको समाचार नेपाली पाठकहरूका लागि तयार पारिएको एक सफा र सरल न्यूज एग्रिगेटर हो।</p>
    <p>हामी विभिन्न विश्वसनीय स्रोतहरूबाट समाचार संकलन गरी एउटै ठाउँमा प्रस्तुत गर्छौं।</p>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>होम</span></a>
    <a href="index.html" class="nav-item"><i class="fas fa-bolt"></i><span>ताजा</span></a>
    <a href="index.html" class="nav-item"><i class="fas fa-bookmark"></i><span>सेभ</span></a>
  </nav>

  <script>
    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
  </script>
</body>
</html>
