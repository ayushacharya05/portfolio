<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Support - आजको समाचार</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@500;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root { --primary-color: #0052D4; --surface-light: #F2F4F7; --card-bg-light: #FFFFFF; --text-main-light: #1A1C1E; }
    body { background: var(--surface-light); font-family: 'Outfit', sans-serif; color: var(--text-main-light); padding-bottom: 90px; }
    .app-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1050; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(0,0,0,0.05); }
    .brand-name { font-family: 'Mukta', sans-serif; font-weight: 800; font-size: 1.8rem; margin: 0; color: #000; }
    .support-card { margin: 10px 16px; background: var(--card-bg-light); border-radius: 24px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .support-item { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); text-decoration: none; color: inherit; }
    .item-icon { width: 45px; height: 45px; background: rgba(0, 82, 212, 0.1); color: var(--primary-color); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 10px 0 25px 0; text-align: center; box-shadow: 0 -2px 15px rgba(0,0,0,0.08); }
    .nav-item { color: #70757A; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
    .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 2px; }
    body.dark-mode { background: #0E1113; color: #E2E2E6; }
    .dark-mode .app-header { background: #111; border-bottom-color: #333; }
    .dark-mode .brand-name { color: white; }
    .dark-mode .support-card { background: #1C1F26; }
    .dark-mode .bottom-nav { background: #111; }
  </style>
</head>
<body>

  <header class="app-header">
    <a href="index.html" style="color: inherit;"><i class="fas fa-arrow-left fa-lg"></i></a>
    <h1 class="brand-name">आजको समाचार</h1>
    <div></div>
  </header>

  <div class="text-center mt-4 mb-3">
    <i class="fas fa-headset fa-3x" style="color:var(--primary-color)"></i>
    <h2 class="fw-bold">सहयोग</h2>
  </div>

  <div class="support-card">
    <div class="support-item">
      <div class="item-icon"><i class="fas fa-user"></i></div>
      <div><h6 class="mb-0">Ayush Acharya</h6><small class="text-muted">Developer</small></div>
    </div>
    <a href="mailto:Contact@ayushacharya5.com.np" class="support-item">
      <div class="item-icon"><i class="fas fa-envelope"></i></div>
      <div><h6 class="mb-0">इमेल</h6><small class="text-muted">Contact@ayushacharya5.com.np</small></div>
    </a>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>होम</span></a>
    <a href="index.html" class="nav-item"><i class="fas fa-bolt"></i><span>ताजा</span></a>
    <a href="index.html" class="nav-item"><i class="fas fa-bookmark"></i><span>सेभ</span></a>
  </nav>

  <script>
    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
  </script>
</body>
</html>
